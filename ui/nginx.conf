# nginx config for the v1 status page.
#
# nginx serves the static assets and proxies the public API endpoints
# (/healthz, /v1/...) to the core service. Same-origin keeps the
# browser side free of CORS plumbing — and means the UI's only knob
# into the core is the public API surface (ADR-006 §3).
#
# Auth in v1 is a stub: the core requires X-Principal-Id but accepts
# any well-formed value (`type:id`). We inject a dedicated UI principal
# at the proxy layer so audit rows clearly distinguish UI-driven calls
# from connector or smoke-test calls. When real auth replaces the stub,
# this header injection is removed and the UI sends a session token
# upstream like any other client.

server {
    listen       8080;
    server_name  _;

    # Static assets — served directly out of the image.
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip the small set of text assets we ship. Nothing fancy.
    gzip            on;
    gzip_types      text/css application/javascript text/html;
    gzip_min_length 256;

    # Public API passthrough. The two location blocks below are the
    # ONLY paths proxied to the core; anything else falls through to
    # static-asset serving. If a future UI capability needs a new
    # endpoint, that endpoint is added to the public API first
    # (per ADR-006 §5) and listed here — no `/internal/...` shortcut.
    location /healthz {
        proxy_pass         http://core:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass         http://core:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Stub-auth principal for the UI. Replace at the same time the
        # core swaps StubAuthorizer for a real authorizer.
        proxy_set_header   X-Principal-Id    "user:soar-ui";
    }

    # SPA-style fallback: unknown paths return index.html so deep links
    # would work if the UI ever introduces client-side routing. Keeping
    # this in v1 avoids one round of nginx config churn later.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
